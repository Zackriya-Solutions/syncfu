name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # --- Build desktop app + CLI together (4 platforms) ---
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            cli-artifact: syncfu-darwin-arm64
            tauri-args: --target aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            cli-artifact: syncfu-darwin-x86_64
            tauri-args: --target x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli-artifact: syncfu-linux-x86_64
            tauri-args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cli-artifact: syncfu-windows-x86_64.exe
            tauri-args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri-args }}
          tagName: ${{ github.ref_name }}
          releaseName: "syncfu ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false

      - name: Build CLI
        run: cargo build --release -p syncfu-cli --target ${{ matrix.target }}

      - name: Rename CLI binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/syncfu.exe ${{ matrix.cli-artifact }}
          else
            cp target/${{ matrix.target }}/release/syncfu ${{ matrix.cli-artifact }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.cli-artifact }}
          path: ${{ matrix.cli-artifact }}

  # --- Linux ARM64 CLI only (no desktop) ---
  build-cli-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-aarch64-unknown-linux-gnu

      - name: Install cross-compile deps
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild --version 0.19.8 --locked
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu cmake libclang-dev
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build CLI
        run: cargo zigbuild --release -p syncfu-cli --target aarch64-unknown-linux-gnu

      - name: Rename binary
        run: cp target/aarch64-unknown-linux-gnu/release/syncfu syncfu-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: cli-syncfu-linux-arm64
          path: syncfu-linux-arm64

  # --- Collect CLI artifacts into the release ---
  release:
    needs: [build, build-cli-linux-arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: cli-artifacts

      - name: Generate checksums
        working-directory: cli-artifacts
        run: sha256sum syncfu-* > checksums.txt

      - name: Upload CLI artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Wait for tauri-action to create the draft release
          for i in 1 2 3 4 5; do
            RELEASE_ID=$(gh api repos/${{ github.repository }}/releases --jq ".[] | select(.tag_name==\"${TAG}\") | .id" | head -1)
            [ -n "$RELEASE_ID" ] && break
            sleep 5
          done
          if [ -z "$RELEASE_ID" ]; then
            echo "Release not found for tag ${TAG}, creating..."
            gh release create "${TAG}" --repo "${{ github.repository }}" --draft --title "syncfu ${TAG}"
          fi
          gh release upload "${TAG}" cli-artifacts/* --repo "${{ github.repository }}" --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false \
            --notes "## Install

          **macOS / Linux (one command):**
          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
          \`\`\`

          ## What's included
          - **Desktop app** — tray icon, overlay notifications, HTTP server on port 9868
          - **CLI** — \`syncfu send \"hello\"\` from any terminal or AI agent

          ## Changes
          See commit history for details."
